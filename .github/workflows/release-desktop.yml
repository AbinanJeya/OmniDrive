name: release-desktop

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            bundles: nsis
          - platform: ubuntu-22.04
            bundles: appimage,deb,rpm

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev

      - name: Install dependencies
        run: npm ci

      - name: Build and publish desktop bundles
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_SUPABASE_URL: https://iznnxpvqhfbdsyqpbhtr.supabase.co
          VITE_SUPABASE_ANON_KEY: sb_publishable_kuU3zQbLtOzhoF29-vEPtQ_lAFeR5oB
          VITE_TURNSTILE_SITE_KEY: 0x4AAAAAADFczBFVTYn8AXLk
          VITE_GOOGLE_CLIENT_ID: 786332327705-kf87glvn5hudo369s9hpqppirb0onm85.apps.googleusercontent.com
          GOOGLE_CLIENT_ID: 786332327705-kf87glvn5hudo369s9hpqppirb0onm85.apps.googleusercontent.com
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: .
          tauriScript: npm run tauri
          args: --bundles ${{ matrix.bundles }}
          tagName: nightly
          releaseName: OmniDrive Nightly
          releaseBody: Automatically built from the latest push to `main`.
          prerelease: true
          releaseDraft: false
          generateReleaseNotes: true
